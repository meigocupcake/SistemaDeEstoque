<html>
    <head> <!-- colocar .. para java dar a dica -->
        <link rel="stylesheet" href="../css/reset.css"/>
        <title>Dashboard</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
    </head>
    <body>
        <header>
            <!-- <img source para por imagem -->
            <h1 id="tituloDashboard">Sistema de Estoque</h1>
            <nav>
                <ul> <!-- ul - linha não ordenada -->
                    <!-- li = linha -->
                    <li><a href="#">Inicio</a></li>
                    <li><a href="#">Gerenciamento</a></li>
                </ul>
            </nav>
        </header>
        <main>
            <section id="resumoEstoque">
                <div class="card-resumo">
                    <h2 class="titulo-card">Entrada</h2>
                    <p class="valor-card">20</p>
                </div>
                <div class="card-resumo">
                    <h2 class="titulo-card">Saída</h2>
                    <p class="valor-card">5</p>
                </div>
                 <div class="card-resumo">
                    <h2 class="titulo-card">Total</h2>
                    <p class="valor-card">15</p>
                </div>
            </section>
            <section id="filtro">
                <div class="grupo-filtro">
                    <label for="filtroData">Data</label>
                    <input type="date" id="filtroData" class="input-filtro">
                </div>
                <div class="grupo-filtro">
                    <label for="tipoMovimentacao">Tipo</label>
                    <select id="tipoMovimentacao" class="select-filtro">
                        <option value="">Selecione uma opção</option>
                        <option value="entrada">Selecione uma opção</option>
                        <option value="saida">Selecione uma opção</option>
                    </select>
                </div>
                <div class="grupo-filtro´pesquisa-nome">
                    <label for="pesquisaNome">Pesquisar item</label>
                    <input type="text" id="pesquisarNome" class="input-filtro" placeholder="Digite o nome do item"> <!-- colocar text ao invés de search para tratar pesquisa no js-->
                </div>
                <div class="grupo-filtro´botao-pesquisa" >
                    <button id="btnPesquisar">Pesquisar</button>
                </div>
            </section>
            <section id="tabelaEstoqueContainer">
                <div class="tabela-wrapper">
                    <table id="tabelaEstoque">
                        <thead>
                            <tr>
                                <th>Código de barras</th>
                                <th>Nome</th>
                                <th>Fabricante</th>
                                <th>Marca</th>
                                <th>Quantidade</th>
                                <th>Valor unitário</th>
                                <th>Total</th>
                            </tr>
                        </thead>
                        <tbody id="corpoTabela">
                            <tr class="linha-item">
                                <td>123456789</td>
                                <td>Mouse</td>
                                <td>Logitech</td>
                                <td>MX</td>
                                <td>10</td>
                                <td>R$ 70</td>
                                <td>R$ 700</td>
                            </tr>
                            <tr class="linha-item">
                                <td>987456321</td>
                                <td>Teclado</td>
                                <td>Logitech</td>
                                <td>MX</td>
                                <td>5</td>
                                <td>R$ 200</td>
                                <td>R$ 1000</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </section>
            <section id="paginacao">
                <div class="controle-paginacao">
                    <label for="pagina">Página</label>
                    <select id="pagina">
                        <option value="1">1</option>
                        <option value="2">2</option>
                        <option value="3">3</option>
                        <option value="4">4</option>
                    </select>
                </div>
                <div class="container-btn">
                    <button id="btnVoltar" class="btn-voltar">Voltar</button>
                    <button id="btnProximo" class="btn-proximo">Próximo</button>
                </div>
            </section>
        </main>
    </body>
</html>
